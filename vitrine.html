<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonstração de Vitrine | Fernanda Sthephanny</title>

  <link rel="icon" type="image/png" href="logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --teal-dark:  #176878;
      --teal:       #2aafc4;
      --teal-light: #72d4e0;
      --white:      #ffffff;
      --gray-dark:  #2d3748;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Trava scroll e esconde barra de rolagem */
    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      scrollbar-width: none;       /* Firefox */
      -ms-overflow-style: none;    /* IE / Edge */
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; }  /* Chrome / Safari */

    body {
      font-family: 'Lato', sans-serif;
      color: var(--gray-dark);
      background: #f5f5f5;
    }

    /* ─── HEADER (80px) ─── */
    #header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      height: 80px;
      z-index: 1000;
      background: rgba(255,255,255,.97);
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
    }

    .logo-img { height: 50px; display: block; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--gray-dark);
      transition: color .2s;
    }

    .nav-links a:hover { color: var(--teal); }

    .nav-cta {
      background: linear-gradient(135deg, var(--teal-dark), var(--teal)) !important;
      color: #fff !important;
      padding: 9px 22px;
      border-radius: 50px;
      box-shadow: 0 4px 14px rgba(42,175,196,.35);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 25px; height: 2.5px;
      background: var(--gray-dark);
      border-radius: 2px;
    }

    /* ─── MOBILE NAV ─── */
    #mobileNav {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(23,104,120,.97);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    #mobileNav.open { display: flex; }

    #mobileNav a {
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .close-nav {
      position: absolute;
      top: 24px; right: 28px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }

    /* ─── IFRAME (entre header e badge) ─── */
    .iframe-wrap {
      position: fixed;
      top: 80px;
      left: 0;
      right: 0;
      bottom: 63px;
      z-index: 1;
    }

    .iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .iframe-wrap iframe::-webkit-scrollbar { display: none; }

    /* ─── BADGE INFERIOR (63px) ─── */
    .bottom-badge {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      height: 63px;
      background: linear-gradient(135deg, #0d4555 0%, var(--teal-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 1000;
      box-shadow: 0 -2px 16px rgba(0,0,0,.15);
    }

    .badge-txt {
      color: rgba(255,255,255,.78);
      font-family: 'Montserrat', sans-serif;
      font-size: .78rem;
      letter-spacing: .06em;
      font-weight: 500;
    }

    .badge-wpp {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      box-shadow: 0 4px 14px rgba(37,211,102,.4);
      transition: transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }

    .badge-wpp:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(37,211,102,.5);
    }

    .badge-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      text-decoration: none;
      padding: 9px 20px;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: .78rem;
      transition: background .2s;
    }

    .badge-back:hover { background: rgba(255,255,255,.2); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .nav-links  { display: none; }
      .hamburger  { display: flex; }
      .badge-txt  { display: none; }
      .badge-back { display: none; }
      .badge-wpp  { font-size: .78rem; padding: 9px 20px; }
    }

    @media (max-width: 380px) {
      #header { padding: 0 4%; }
      .logo-img { height: 42px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <a href="index.html">
    <img src="logo.png" alt="Fernanda Sthephanny Estética" class="logo-img">
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="index.html#servicos">Serviços</a></li>
      <li><a href="index.html#mvv">Valores</a></li>
      <li><a href="index.html#depoimentos">Depoimentos</a></li>
      <li><a href="index.html#contato" class="nav-cta">Agendar</a></li>
    </ul>
  </nav>
  <button class="hamburger" onclick="openNav()" aria-label="Abrir menu">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- MOBILE NAV -->
<nav id="mobileNav">
  <button class="close-nav" onclick="closeNav()" aria-label="Fechar menu">&times;</button>
  <a href="index.html#sobre"       onclick="closeNav()">Sobre</a>
  <a href="index.html#servicos"    onclick="closeNav()">Serviços</a>
  <a href="index.html#mvv"         onclick="closeNav()">Valores</a>
  <a href="index.html#depoimentos" onclick="closeNav()">Depoimentos</a>
  <a href="index.html#contato"     onclick="closeNav()">Agendar</a>
</nav>

<!-- IFRAME VITRINE -->
<div class="iframe-wrap" id="iframeWrap">
  <iframe
    src="https://fernandasthephannyesteti.egestor.com.br/vitrine/"
    title="Vitrine Fernanda Sthephanny Estética"
    allow="payment; fullscreen"
    loading="lazy">
  </iframe>
</div>

<!-- BADGE INFERIOR -->
<div class="bottom-badge">
  <span class="badge-txt">Agende seu procedimento diretamente pelo WhatsApp</span>
  <!-- Atualizar o número do WhatsApp abaixo -->
  <a href="https://wa.me/5599XXXXXXXX?text=Ol%C3%A1%20Fernanda!%20Quero%20agendar%20uma%20consulta."
     target="_blank" rel="noopener" class="badge-wpp">
    <i class="fab fa-whatsapp"></i> Agendar pelo WhatsApp
  </a>
  <a href="index.html" class="badge-back">
    <i class="fas fa-arrow-left"></i> Voltar ao site
  </a>
</div>

<script>
  /* ── Mobile Nav ── */
  function openNav()  { document.getElementById('mobileNav').classList.add('open'); }
  function closeNav() { document.getElementById('mobileNav').classList.remove('open'); }

  document.getElementById('mobileNav').addEventListener('click', function(e) {
    if (e.target === this) closeNav();
  });

  /* ── Ajuste dinâmico do iframe ao redimensionar ── */
  const HEADER_H = 80;
  const BADGE_H  = 63;
  const wrap     = document.getElementById('iframeWrap');

  function resizeIframe() {
    const h = window.innerHeight - HEADER_H - BADGE_H;
    wrap.style.height = h + 'px';
    wrap.style.bottom = BADGE_H + 'px';
  }

  window.addEventListener('resize', resizeIframe);
  resizeIframe();
</script>

</body>
</html>
